name: Test - Demo FS (TypeScript/Next.js)

on:
  schedule:
    - cron: "0 23 * * *" # 6 AM WIB (UTC+7)
    - cron: "0 11 * * *" # 6 PM WIB (UTC+7)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration:
    uses: ./.github/workflows/_reusable-backend-integration.yml
    with:
      backend-name: a-demo-fs-ts-nextjs
      language: typescript
      compose-file: apps/a-demo-fs-ts-nextjs/docker-compose.integration.yml

  # NOTE: BE E2E (a-demo-be-e2e) tests use Go backend API paths (/auth/login)
  # which are incompatible with the FS Next.js API routes (/api/v1/auth/login).
  # The FS app's backend functionality is covered by integration tests above.
