name: Codecov Upload

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  coverage:
    name: test:quick + upload coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- Language setup via composite actions ---
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-golang
      - uses: ./.github/actions/setup-dotnet
      - uses: ./.github/actions/setup-python

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.156.0"
          extended: true

      - name: Generate contract types (required before test:quick)
        run: |
          npx nx run organiclever-contracts:bundle
          npx nx run-many -t codegen --projects=organiclever-*

      - name: Restore .NET dependencies (required before --no-restore typecheck)
        run: |
          dotnet restore apps/organiclever-be/src/OrganicLeverBe/OrganicLeverBe.fsproj

      - name: typecheck (all projects)
        run: npx nx run-many -t typecheck --all --parallel=$(($(nproc) - 1))

      - name: test:quick (all projects)
        run: npx nx run-many -t test:quick --all --parallel=$(($(nproc) - 1))

      # --- Fix LCOV paths for monorepo (vitest/Python emit relative src/ paths) ---
      - name: Prepend app paths to LCOV source files
        run: |
          for app in oseplatform-web ayokoding-web organiclever-fe; do
            lcov="apps/${app}/coverage/lcov.info"
            if [ -f "$lcov" ]; then
              sed -i "s|^SF:|SF:apps/${app}/|" "$lcov"
              echo "Fixed paths in $lcov"
            fi
          done

      # --- Coverage uploads ---

      - name: Upload coverage — oseplatform-web
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/oseplatform-web/coverage/lcov.info
          flags: oseplatform-web
          disable_search: true
          fail_ci_if_error: false

      - name: Upload coverage — ayokoding-web
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/ayokoding-web/coverage/lcov.info
          flags: ayokoding-web
          disable_search: true
          fail_ci_if_error: false

      - name: Upload coverage — organiclever-fe
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/organiclever-fe/coverage/lcov.info
          flags: organiclever-fe
          disable_search: true
          fail_ci_if_error: false

      - name: Upload coverage — organiclever-be
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/organiclever-be/coverage/altcov.info
          flags: organiclever-be
          disable_search: true
          fail_ci_if_error: false

      - name: Upload coverage — rhino-cli
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/rhino-cli/cover.out
          flags: rhino-cli
          disable_search: true
          fail_ci_if_error: false

      - name: Upload coverage — ayokoding-cli
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/ayokoding-cli/cover.out
          flags: ayokoding-cli
          disable_search: true
          fail_ci_if_error: false

      - name: Upload coverage — oseplatform-cli
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/oseplatform-cli/cover.out
          flags: oseplatform-cli
          disable_search: true
          fail_ci_if_error: false

      - name: Upload coverage — golang-commons
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: libs/golang-commons/cover.out
          flags: golang-commons
          disable_search: true
          fail_ci_if_error: false

      - name: Upload coverage — hugo-commons
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: libs/hugo-commons/cover.out
          flags: hugo-commons
          disable_search: true
          fail_ci_if_error: false
