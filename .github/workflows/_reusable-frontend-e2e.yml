name: Frontend - E2E Tests

on:
  workflow_call:
    inputs:
      frontend-name:
        required: true
        type: string
        description: "Frontend Nx project name"
      fe-e2e-name:
        required: true
        type: string
        description: "Frontend E2E Nx project name"
      backend-codegen-target:
        required: true
        type: string
        description: "Backend codegen Nx target (e.g., my-be:codegen)"
      compose-dir:
        required: true
        type: string
        description: "Path to infra/dev compose directory"
      extra-language:
        required: false
        type: string
        default: ""
        description: "Additional language runtime to set up (e.g., flutter)"
      extra-codegen-targets:
        required: false
        type: string
        default: ""
        description: "Space-separated extra codegen Nx targets to run"
      extra-post-codegen:
        required: false
        type: string
        default: ""
        description: "Extra shell command to run after codegen (e.g., flutter pub get in a specific dir)"
      frontend-port:
        required: false
        type: number
        default: 3301
        description: "Frontend port to wait for"
      backend-url:
        required: false
        type: string
        default: "http://localhost:8201"
        description: "Backend URL for Playwright"
      health-timeout:
        required: false
        type: number
        default: 360
        description: "Seconds to wait for frontend health (default: 360)"

permissions:
  contents: read

jobs:
  e2e:
    name: E2E tests - ${{ inputs.frontend-name }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-docker-cache
      - uses: ./.github/actions/setup-golang
      - name: Setup extra language runtime
        if: inputs.extra-language != ''
        uses: ./.github/actions/setup-language
        with:
          language: ${{ inputs.extra-language }}

      - name: Generate contract types
        run: |
          npx nx run ${{ inputs.backend-codegen-target }}
          npx nx run ${{ inputs.frontend-name }}:codegen
          for target in ${{ inputs.extra-codegen-targets }}; do
            npx nx run "$target"
          done

      - name: Extra post-codegen steps
        if: inputs.extra-post-codegen != ''
        run: ${{ inputs.extra-post-codegen }}

      - name: Start full stack
        run: docker compose -f ${{ inputs.compose-dir }}/docker-compose.yml up --build -d

      - name: Wait for frontend to be ready
        run: |
          TIMEOUT=${{ inputs.health-timeout }}
          ITERATIONS=$((TIMEOUT / 10))
          PORT=${{ inputs.frontend-port }}
          echo "Waiting for frontend to be ready on port ${PORT} (timeout: ${TIMEOUT}s)..."
          for i in $(seq 1 $ITERATIONS); do
            if curl -sf http://localhost:${PORT} > /dev/null 2>&1; then
              echo "Frontend is ready"
              exit 0
            fi
            echo "[$i/$ITERATIONS] Waiting..."
            sleep 10
          done
          echo "Frontend did not start within ${TIMEOUT}s"
          docker compose -f ${{ inputs.compose-dir }}/docker-compose.yml logs
          exit 1

      - uses: ./.github/actions/setup-playwright

      - name: Run FE E2E tests
        run: npx nx run ${{ inputs.fe-e2e-name }}:test:e2e
        env:
          BASE_URL: http://localhost:${{ inputs.frontend-port }}
          BACKEND_URL: ${{ inputs.backend-url }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fe-e2e-${{ inputs.frontend-name }}
          path: apps/${{ inputs.fe-e2e-name }}/playwright-report/
          retention-days: 7

      - name: Teardown
        if: always()
        run: docker compose -f ${{ inputs.compose-dir }}/docker-compose.yml down -v
