name: Test and Deploy - OSE Application Web Development

on:
  schedule:
    - cron: "0 20 * * *" # 3 AM WIB (UTC+7)
    - cron: "0 8 * * *" # 3 PM WIB (UTC+7)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  spec-coverage:
    name: Spec coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-golang
      - name: Run spec-coverage for all OSE Application projects
        run: |
          npx nx run ose-app-be:spec-coverage
          npx nx run ose-app-web:spec-coverage

  fe-lint:
    name: FE lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - run: npx nx run ose-app-web:lint

  be-integration:
    name: BE integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ose-app-web-development

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node

      - name: Generate contract types for backend
        run: |
          npx nx run ose-app-contracts:bundle
          npx nx run ose-app-be:codegen

      - name: Run integration tests
        run: |
          docker compose -f apps/ose-app-be/docker-compose.integration.yml down -v 2>/dev/null || true
          docker compose -f apps/ose-app-be/docker-compose.integration.yml up --abort-on-container-exit --build

      - name: Teardown integration
        if: always()
        run: docker compose -f apps/ose-app-be/docker-compose.integration.yml down -v

  fe-integration:
    name: FE integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node

      - name: Generate contract types
        run: |
          npx nx run ose-app-contracts:bundle
          npx nx run ose-app-web:codegen

      - name: Run integration tests
        run: npx nx run ose-app-web:test:integration

  e2e:
    name: E2E tests (BE + FE)
    needs: [be-integration, fe-integration]
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: ose-app-web-development

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node

      - name: Generate contract types
        run: |
          npx nx run ose-app-contracts:bundle
          npx nx run ose-app-be:codegen
          npx nx run ose-app-web:codegen

      - name: Start full stack (backend + frontend)
        run: docker compose -f infra/dev/ose-app/docker-compose.yml -f infra/dev/ose-app/docker-compose.ci.yml up --build -d

      - name: Wait for backend to be healthy
        run: |
          echo "Waiting for backend on port 8302..."
          for i in $(seq 1 36); do
            if curl -sf http://localhost:8302/api/v1/health > /dev/null 2>&1; then
              echo "Backend is healthy"
              exit 0
            fi
            echo "[$i/36] Waiting..."
            sleep 10
          done
          echo "Backend did not become healthy within 6 minutes"
          docker compose -f infra/dev/ose-app/docker-compose.yml -f infra/dev/ose-app/docker-compose.ci.yml logs ose-app-be
          exit 1

      - name: Wait for frontend to be ready
        run: |
          echo "Waiting for frontend on port 3300..."
          for i in $(seq 1 36); do
            if curl -sf http://localhost:3300 > /dev/null 2>&1; then
              echo "Frontend is ready"
              exit 0
            fi
            echo "[$i/36] Waiting..."
            sleep 10
          done
          echo "Frontend did not start within 6 minutes"
          docker compose -f infra/dev/ose-app/docker-compose.yml -f infra/dev/ose-app/docker-compose.ci.yml logs ose-app-web
          exit 1

      - uses: ./.github/actions/setup-playwright

      - name: Run BE E2E tests
        run: npx nx run ose-app-be-e2e:test:e2e
        env:
          BASE_URL: http://localhost:8302

      - name: Upload BE E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-ose-app-be
          path: apps/ose-app-be-e2e/playwright-report/
          retention-days: 7

      - name: Run FE E2E tests
        run: npx nx run ose-app-web-e2e:test:e2e
        env:
          WEB_BASE_URL: http://localhost:3300

      - name: Upload FE E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-ose-app-web
          path: apps/ose-app-web-e2e/playwright-report/
          retention-days: 7

      - name: Teardown
        if: always()
        run: docker compose -f infra/dev/ose-app/docker-compose.yml -f infra/dev/ose-app/docker-compose.ci.yml down -v

  specs-gate:
    name: Specs gate (BDD+DDD validators)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-golang
      - run: npx nx run-many -t validate:specs-adoption validate:specs-tree validate:specs-counts validate:specs-links --projects=rhino-cli

  deploy:
    name: Deploy to staging
    needs: [spec-coverage, fe-lint, be-integration, fe-integration, e2e, specs-gate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Vercel listens to `stag-ose-app-web` and starts a build on every
      # push. Allow ~5 minutes after this push completes before triggering
      # `test-ose-app-web-staging.yml` — running the staging E2E earlier
      # will hit the previous deploy or the Vercel build wall.
      - run: git push origin HEAD:stag-ose-app-web --force
