name: Integration Tests

on:
  schedule:
    # Run 4x daily: WIB 04, 10, 16, 22 (UTC 21, 03, 09, 15)
    - cron: "0 21 * * *"
    - cron: "0 3 * * *"
    - cron: "0 9 * * *"
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration-tests:
    name: test:integration — all projects
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Volta
        uses: volta-cli/action@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Setup Java 21 (Gradle/Kotlin)
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Java 25 (Maven/Vert.x — default JAVA_HOME)
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "27"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.156.0"
          extended: true

      - name: Setup Clojure CLI
        run: |
          curl -L -O https://github.com/clojure/brew-install/releases/latest/download/linux-install.sh
          chmod +x linux-install.sh
          sudo ./linux-install.sh
          rm linux-install.sh

      - name: Install dependencies
        run: npm ci

      - name: Install Elixir dependencies
        run: |
          (cd libs/elixir-gherkin && mix deps.get)
          (cd libs/elixir-cabbage && mix deps.get)
          (cd apps/demo-be-elixir-phoenix && mix deps.get)

      - name: Install Python dependencies
        run: (cd apps/demo-be-python-fastapi && uv sync)

      - name: Install Clojure dependencies
        run: (cd apps/demo-be-clojure-pedestal && JAVA_HOME=${JAVA_HOME_21_X64:-$JAVA_HOME} clojure -P && JAVA_HOME=${JAVA_HOME_21_X64:-$JAVA_HOME} clojure -P -M:test:coverage)

      - name: test:integration (all projects)
        run: npx nx run-many -t test:integration --all
