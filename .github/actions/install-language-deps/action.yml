name: "Install Language Dependencies"
description: "Install language-specific dependencies needed before build/lint/test (.NET restore for retained F# backends)"
inputs:
  language:
    required: true
    description: "Language runtime (golang, dotnet, python, typescript)"
  backend-name:
    required: false
    default: ""
    description: "Backend project name (used to scope dependency installation for .NET projects)"
runs:
  using: "composite"
  steps:
    - name: Restore .NET dependencies
      if: inputs.language == 'dotnet'
      shell: bash
      run: |
        if [ "${{ inputs.backend-name }}" = "organiclever-be" ]; then
          dotnet restore apps/organiclever-be/src/OrganicLeverBe/OrganicLeverBe.fsproj
        fi
