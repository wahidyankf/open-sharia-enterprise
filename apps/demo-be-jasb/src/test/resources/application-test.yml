# Test profile: Testcontainers provides the PostgreSQL datasource via @ServiceConnection.
# No datasource URL/driver config needed here - auto-configured from the container bean.
spring:
  liquibase:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

app:
  jwt:
    secret: test-jwt-secret-at-least-32-chars-long-for-hs256
    expiration-ms: 3600000 # 1 hour for tests

management:
  endpoint:
    health:
      show-details: when-authorized
