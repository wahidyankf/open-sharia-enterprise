# Golden output manifest for rhino-cli cmd package.
# Each entry drives one scenario in TestGolden (cmd/golden_test.go).
#
# Fields:
#   name        - unique snake_case identifier; golden file is testdata/golden/<name>.stdout
#   args        - cobra args passed to the subcommand RunE (positional args only; flags are
#                 set via package-level variables in the test setup)
#   exit_ok     - true  → RunE must return nil
#                 false → RunE must return non-nil error
#   mock_id     - which pre-wired mock scenario to activate (see golden_test.go setupMock)
#   command_ref - human-readable description of which cobra command is exercised
#
# ── Global flags ───────────────────────────────────────────────────────────────

fixtures:
  # ── doctor ─────────────────────────────────────────────────────────────────
  - name: doctor_text_all_ok
    args: []
    exit_ok: true
    mock_id: doctor_all_ok
    command_ref: "doctor (text, all tools ok)"

  - name: doctor_text_missing_tool
    args: []
    exit_ok: false
    mock_id: doctor_missing_tool
    command_ref: "doctor (text, one tool missing)"

  - name: doctor_json_all_ok
    args: []
    exit_ok: true
    mock_id: doctor_all_ok_json
    command_ref: "doctor -o json (all tools ok)"

  - name: doctor_markdown_all_ok
    args: []
    exit_ok: true
    mock_id: doctor_all_ok_markdown
    command_ref: "doctor -o markdown (all tools ok)"

  # ── test-coverage validate ──────────────────────────────────────────────────
  - name: test_coverage_validate_go_pass
    args: ["cover.out", "85"]
    exit_ok: true
    mock_id: tc_validate_go_pass
    command_ref: "test-coverage validate (Go format, pass)"

