# Local Development Environment for Demo Backend (FSGI — F#/Giraffe)
# Mutually exclusive with demo-be-jasb and demo-be-exph — all bind port 8201.
# Do not run multiple backend stacks simultaneously.

services:
  demo-be-fsgi-db:
    image: postgres:17-alpine
    container_name: demo-be-fsgi-db
    environment:
      POSTGRES_DB: demo_be_fsgi
      POSTGRES_USER: ${POSTGRES_USER:-demo_be_fsgi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-demo_be_fsgi}
    ports:
      - "5432:5432"
    volumes:
      - demo-be-fsgi-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-demo_be_fsgi} -d demo_be_fsgi"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - demo-be-fsgi-network

  demo-be-fsgi:
    build:
      context: .
      dockerfile: Dockerfile.be.dev
    container_name: demo-be-fsgi
    working_dir: /workspace

    # Mount app source and shared Gherkin specs.
    volumes:
      - ../../../apps/demo-be-fsgi:/workspace:rw
      - ../../../specs/apps/demo-be/gherkin:/specs/apps/demo-be/gherkin:ro

    ports:
      - "8201:8201"

    depends_on:
      demo-be-fsgi-db:
        condition: service_healthy

    environment:
      - DOTNET_ENVIRONMENT=Development
      - DATABASE_URL=Host=demo-be-fsgi-db;Port=5432;Database=demo_be_fsgi;Username=demo_be_fsgi;Password=demo_be_fsgi
      - APP_JWT_SECRET=${APP_JWT_SECRET:-change-me-in-dev-only-not-for-production}

    command: dotnet run --project src/DemoBeFsgi/DemoBeFsgi.fsproj

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8201/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

    restart: unless-stopped
    networks:
      - demo-be-fsgi-network

networks:
  demo-be-fsgi-network:
    driver: bridge
    name: demo-be-fsgi-network

volumes:
  demo-be-fsgi-db-data:
