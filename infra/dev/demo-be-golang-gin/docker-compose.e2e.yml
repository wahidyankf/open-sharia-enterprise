# E2E override for demo-be-e2e Playwright tests
# Use with: docker compose -f docker-compose.yml -f docker-compose.e2e.yml
#
# Keeps the stack in production-equivalent mode during E2E and enables
# the test-only API endpoints required for database cleanup between scenarios.
services:
  demo-be-golang-gin:
    environment:
      - GIN_MODE=release
      - ENABLE_TEST_API=true
