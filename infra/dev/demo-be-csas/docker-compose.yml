# Local Development Environment for Demo Backend (CSAS — C#/ASP.NET Core)
# Mutually exclusive with demo-be-jasb, demo-be-exph, demo-be-fsgi, demo-be-gogn,
# demo-be-pyfa, demo-be-rsax, and demo-be-ktkt — all bind port 8201.
# Do not run multiple backend stacks simultaneously.

services:
  demo-be-csas-db:
    image: postgres:17-alpine
    container_name: demo-be-csas-db
    environment:
      POSTGRES_DB: demo_be_csas
      POSTGRES_USER: ${POSTGRES_USER:-demo_be_csas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-demo_be_csas}
    ports:
      - "5432:5432"
    volumes:
      - demo-be-csas-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-demo_be_csas} -d demo_be_csas"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - demo-be-csas-network

  demo-be-csas:
    build:
      context: .
      dockerfile: Dockerfile.be.dev
    container_name: demo-be-csas
    working_dir: /workspace

    # Mount app source and shared Gherkin specs.
    volumes:
      - ../../../apps/demo-be-csas:/workspace:rw
      - ../../../specs/apps/demo-be/gherkin:/specs/apps/demo-be/gherkin:ro

    ports:
      - "8201:8201"

    depends_on:
      demo-be-csas-db:
        condition: service_healthy

    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8201
      - DATABASE_URL=Host=demo-be-csas-db;Port=5432;Database=demo_be_csas;Username=demo_be_csas;Password=demo_be_csas
      - APP_JWT_SECRET=${APP_JWT_SECRET:-change-me-in-dev-only-not-for-production}

    command: dotnet run --project src/DemoBeCsas/DemoBeCsas.csproj

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8201/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

    restart: unless-stopped
    networks:
      - demo-be-csas-network

networks:
  demo-be-csas-network:
    driver: bridge
    name: demo-be-csas-network

volumes:
  demo-be-csas-db-data:
